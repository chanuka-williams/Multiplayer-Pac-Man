name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++

          - os: macos-15-intel
            c_compiler: clang
            cpp_compiler: clang++
        
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          
          - os: ubuntu-latest
            c_compiler: cl
          
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

          - os: macos-15-intel
            c_compiler: gcc
          - os: macos-15-intel
            c_compiler: cl
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libasound2-dev \
          libx11-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxcursor-dev \
          libxinerama-dev \
          libwayland-dev \
          libxkbcommon-dev
    
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
    
    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}
    
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
    
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      continue-on-error: true
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

    - name: Upload artifacts
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: >-
          Pac-Man-${{
            matrix.os == 'ubuntu-latest' && 'linux' ||
            matrix.os == 'windows-latest' && 'windows' ||
            matrix.os == 'macos-latest' && 'macos-arm' ||
            'macos-x64' }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/game/Pac-Man
          ${{ steps.strings.outputs.build-output-dir }}/game/Pac-Man.exe
          ${{ steps.strings.outputs.build-output-dir }}/game/**/*.app
          ${{ steps.strings.outputs.build-output-dir }}/game/Release/Pac-Man.exe
          ${{ steps.strings.outputs.build-output-dir }}/game/resources/
          ${{ steps.strings.outputs.build-output-dir }}/game/Release/resources/
        retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Zip artifacts
      run: |
        cd artifacts
        for dir in */; do
          zip -r "${dir%/}.zip" "$dir"
        done

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ github.ref_name }}
        draft: false
        prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        files: artifacts/*.zip